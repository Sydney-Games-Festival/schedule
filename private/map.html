<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>SGF Schedule — Venue Map</title>
  <link rel="icon" href="../images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Special+Gothic+Expanded+One&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="../css/base.css?v=1" />
  <link rel="stylesheet" href="../css/map.css?v=1" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1 class="head">SGF Schedule</h1>
      <small>Venue Map · Oct 12–18, 2026</small>
    </div>
    <span id="sourcePill" class="source-pill sample">…</span>
    <div class="spacer"></div>
    <div class="tools">
      <a class="chip-btn" href="admin.html">← Admin</a>
      <button id="themeBtn" class="chip-btn" title="Toggle theme">◐ Theme</button>
    </div>
  </header>

  <section class="filters" aria-label="Filters">
    <div class="field">
      <label>Status</label>
      <div id="statusToggles" class="status-toggles"></div>
    </div>
    <div class="field">
      <label for="daySel">Day</label>
      <select id="daySel"><option value="">All days</option></select>
    </div>
    <div class="field">
      <label for="pubSel">Published</label>
      <select id="pubSel">
        <option value="">Any</option>
        <option value="y">Published (Y)</option>
        <option value="n">Not published</option>
      </select>
    </div>
    <div class="spacer"></div>
    <div class="result-count" id="resultCount"></div>
  </section>

  <div class="map-layout">
    <div id="leafletMap"></div>
    <aside class="side-panel">
      <h2>Venues</h2>
      <p class="hint">Geocoded automatically via OpenStreetMap; venues with a manual
        <code>Venue Lat/Lng</code> column use that instead.</p>
      <div id="geoStatus"></div>
      <div id="unmappedWrap" hidden>
        <h2>Unmapped venues</h2>
        <p class="hint">Couldn't be located automatically — add a <code>Venue Lat/Lng</code> override in the sheet.</p>
        <div id="unmappedList" class="unmapped-list"></div>
      </div>
    </aside>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="../js/config.js?v=3"></script>
  <script src="../js/domain.js?v=5"></script>
  <script src="../js/filters.js?v=1"></script>
  <script src="../js/links.js?v=1"></script>
  <script src="../js/validation.js?v=3"></script>
  <script src="../js/data.js?v=2"></script>
  <script src="../js/geocode.js?v=1"></script>
  <script src="../js/map.js?v=1"></script>
</body>
</html>
